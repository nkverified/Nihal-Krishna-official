<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance // Core Offline</title>
    <style>
        /* --- CSS COLORS & VARIABLES --- */
        :root {
            --bg-dark: #07090e;
            --terminal-bg: rgba(13, 16, 23, 0.90);
            --neon-green: #00ff66;
            --neon-cyan: #00f0ff;
            --neon-red: #ff3366;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        /* --- LAYOUT RESET --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        /* --- ANIMATED MATRIX BACKGROUND --- */
        #matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        /* --- TERMINAL WINDOW CONTAINER --- */
        .terminal-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 650px;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(12px);
            overflow: hidden;
            animation: panel-glow 4s infinite alternate;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .terminal-container:active {
            transform: scale(0.99);
        }

        /* --- TOP WINDOW HEADER BAR --- */
        .terminal-header {
            background: #161b22;
            padding: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .terminal-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .btn.red { background: var(--neon-red); }
        .btn.yellow { background: #ffb86c; }
        .btn.green { background: var(--neon-green); }

        .terminal-title {
            margin-left: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* --- BODY CONTENT --- */
        .terminal-body {
            padding: 40px 30px;
            text-align: center;
        }

        /* --- CYBERPUNK GLITCH EFFECT --- */
        .glitch-wrapper {
            margin-bottom: 20px;
        }

        .glitch-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 4px;
            position: relative;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 var(--neon-cyan);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 var(--neon-red);
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        /* --- TEXT AND CONSOLE TERMINAL OUTPUT --- */
        .clean-message {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .console-box {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 4px;
            padding: 15px;
            text-align: left;
            margin-bottom: 25px;
            min-height: 110px;
        }

        .console-line {
            font-size: 0.9rem;
            color: #c9d1d9;
            margin-bottom: 8px;
        }

        /* Dynamic Blinking Terminal Cursor */
        .cursor {
            display: inline-block;
            background-color: var(--neon-green);
            width: 8px;
            height: 15px;
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        .prompt {
            color: var(--neon-cyan);
            margin-right: 5px;
        }

        .neon-text {
            color: var(--neon-green);
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.4);
        }

        /* --- COUNTDOWN INTERFACE --- */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .countdown-block {
            background: rgba(22, 27, 34, 0.6);
            border: 1px solid #21262d;
            padding: 10px;
            border-radius: 4px;
            min-width: 70px;
        }

        .countdown-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
        }

        .countdown-lbl {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* --- VISUAL SCAN PROGRESS BAR --- */
        .progress-container {
            width: 100%;
            background: #161b22;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 45%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            box-shadow: 0 0 8px var(--neon-cyan);
            border-radius: 3px;
            animation: progress-loop 2.5s infinite ease-in-out;
        }

        /* --- BYPASS OVERLAY MODAL --- */
        .bypass-panel {
            max-height: 0;
            overflow: hidden;
            background: #10141b;
            border-top: 0 solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            padding: 0 30px;
        }

        .bypass-panel.active {
            max-height: 150px;
            padding: 20px 30px;
            border-top: 1px solid var(--border-color);
        }

        .bypass-title {
            font-size: 0.8rem;
            color: var(--neon-red);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .bypass-form {
            display: flex;
            gap: 10px;
        }

        .bypass-input {
            flex: 1;
            background: #07090e;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            color: var(--neon-green);
            font-family: monospace;
            outline: none;
        }

        .bypass-input:focus {
            border-color: var(--neon-cyan);
        }

        .bypass-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s ease;
        }

        .bypass-btn:hover {
            background: rgba(0, 255, 102, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        .bypass-msg {
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }

        /* --- CSS KEYFRAME ANIMATIONS --- */
        @keyframes panel-glow {
            0% { box-shadow: 0 20px 50px rgba(0, 240, 255, 0.05); }
            100% { box-shadow: 0 20px 50px rgba(0, 255, 102, 0.15); }
        }

        @keyframes blink {
            0%, 49% { background-color: var(--neon-green); }
            50%, 100% { background-color: transparent; }
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 66px, 0); }
            10% { clip: rect(34px, 9999px, 55px, 0); }
            20% { clip: rect(85px, 9999px, 5px, 0); }
            30% { clip: rect(11px, 9999px, 85px, 0); }
            40% { clip: rect(63px, 9999px, 92px, 0); }
            50% { clip: rect(49px, 9999px, 102px, 0); }
            60% { clip: rect(78px, 9999px, 12px, 0); }
            70% { clip: rect(5px, 9999px, 115px, 0); }
            80% { clip: rect(122px, 9999px, 45px, 0); }
            90% { clip: rect(90px, 9999px, 130px, 0); }
            100% { clip: rect(26px, 9999px, 70px, 0); }
        }

        @keyframes progress-loop {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(130%); }
            100% { transform: translateX(130%); }
        }

        /* --- RESPONSIVE MOBILE ADAPTATIONS --- */
        @media(max-width: 480px) {
            .terminal-body { padding: 25px 15px; }
            .glitch-text { font-size: 1.6rem; }
            .clean-message { font-size: 0.9rem; }
            .console-line { font-size: 0.8rem; }
            .countdown-container { gap: 8px; }
            .countdown-block { min-width: 55px; padding: 6px; }
            .countdown-val { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<script src="app.js" defer></script>
